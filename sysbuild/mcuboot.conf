# MCUboot must NOT launch the FLPR: the board devicetree enables the
# VPR node (for the app's launcher), and MCUboot inherits it.  If both
# images launch, the app's launcher re-copies the execution SRAM over
# the already-running coprocessor, crashing it and wiping the shared
# block.  The application is the sole VPR launcher.
CONFIG_NORDIC_VPR_LAUNCHER=n
