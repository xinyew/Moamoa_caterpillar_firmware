CONFIG_PRINTK=y
CONFIG_LOG=y

# LFRC (no 32k crystal): declare BLE-max sleep-clock inaccuracy and
# calibrate often — motor/DCDC noise perturbs the RC between calibrations
# (MPSL ASSERT 67,129 seen with 250ppm/4s while the motor runs)
CONFIG_CLOCK_CONTROL_NRF_K32SRC_500PPM=y
CONFIG_CLOCK_CONTROL_NRF_CALIBRATION_PERIOD=1000
CONFIG_MPSL_CALIBRATION_PERIOD=1000
# Large RTT up-buffer so full boot logs survive until a reader attaches
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=8192

CONFIG_I2C=y

# IMU on spi21
CONFIG_SPI=y

# VDC sense on SAADC AIN4
CONFIG_ADC=y

# Reset-cause logging at boot
CONFIG_HWINFO=y

# BLE — peripheral GATT server, Write-Without-Response
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Caterpillar"
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1

# --- OTA DFU: MCUmgr SMP over BLE (open, dev-key signed images) ---
# MCUMGR *depends on* (doesn't select) these:
CONFIG_ZCBOR=y
CONFIG_NET_BUF=y
CONFIG_CRC=y
CONFIG_MCUMGR=y
CONFIG_MCUMGR_TRANSPORT_BT=y
CONFIG_MCUMGR_TRANSPORT_BT_REASSEMBLY=y
# Let clients query our buffer size so they use full-size upload chunks
CONFIG_MCUMGR_GRP_OS_MCUMGR_PARAMS=y
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y
CONFIG_IMG_MANAGER=y
CONFIG_STREAM_FLASH=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_REBOOT=y
# Bigger transfer chunks so OTA isn't glacial
CONFIG_MCUMGR_TRANSPORT_NETBUF_SIZE=2475
CONFIG_BT_L2CAP_TX_MTU=498
CONFIG_BT_BUF_ACL_RX_SIZE=502