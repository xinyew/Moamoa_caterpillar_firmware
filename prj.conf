CONFIG_PRINTK=y
CONFIG_LOG=y
# Large RTT up-buffer so full boot logs survive until a reader attaches
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=8192

CONFIG_I2C=y

# IMU on spi21
CONFIG_SPI=y

# BLE — peripheral GATT server, Write-Without-Response
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Caterpillar"
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1