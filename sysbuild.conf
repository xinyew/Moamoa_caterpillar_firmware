# OTA DFU: MCUboot bootloader, simplest configuration.
#
# No signature key is configured on purpose — the build auto-signs with
# the SDK's public development key (warns "not secure"; accepted: this
# is a research device and DFU is intentionally open).
#
# Overwrite-only: uploaded image replaces the app on next reset, no
# swap/revert machinery.  A broken update is recovered over SWD.
SB_CONFIG_BOOTLOADER_MCUBOOT=y
SB_CONFIG_MCUBOOT_MODE_OVERWRITE_ONLY=y
